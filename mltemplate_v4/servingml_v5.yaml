apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: naive-bayes-prediction-v5
  annotations:
    scenarios.ai.sap.com/description: "naive-bayes serving Pipeline-v5 multi-market"
    scenarios.ai.sap.com/name: "naive-bayes-v5"
    executables.ai.sap.com/description: "naive-bayes prediction-v5"
    executables.ai.sap.com/name: "naive-bayes-prediction-v5"
  labels:
    scenarios.ai.sap.com/id: "naive-bayes-v5"
    ai.sap.com/version: "1.0.0"
spec:
  inputs:
    artifacts:
      - name: multinomialNB_1
      - name: multinomialNB_2

  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: "{}"
      labels: "{\"ai.sap.com/resourcePlan\": \"starter\"}"
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 2
        containers:
          - name: kserve-container
            image: docker.io/rahulcruze786/ml_prediction:v1.10
            ports:
              - containerPort: 8080
                protocol: TCP
            command: ["python", "app.py"]
            env:
              - name: STORAGE_URI
                value: "{{inputs.artifacts.multinomialNB_1}}"
              - name: STORAGE_URI2
                value: "{{inputs.artifacts.multinomialNB_2}}"  
              - name: MODEL_PATH
                value: "/mnt/models"
            resources:
              requests:
                cpu: "0.5"
                memory: "512Mi"
              limits:
                cpu: "1"
                memory: "1Gi"
