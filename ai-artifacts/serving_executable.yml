apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: multinomialnb-model
  labels:
    scenarios.ai.sap.com/id: "ml-classification-scenario"
    executables.ai.sap.com/id: "ml-classification-serving"
    ai.sap.com/version: "1.0.0"
  annotations:
    executables.ai.sap.com/name: "multinomialnb-model"
spec:
  template:
    apiVersion: serving.kserve.io/v1beta1
    metadata:
      annotations: |
        autoscaling.knative.dev/metric: concurrency
        autoscaling.knative.dev/target: "1"
        autoscaling.knative.dev/targetBurstCapacity: "0"
    spec: |
      predictor:
        containers:
          - name: kserve-container
            image: docker.io/rahulcruze786/ml_project_transac-analyzer:0.0.1
            ports:
              - containerPort: 9003
                protocol: TCP
