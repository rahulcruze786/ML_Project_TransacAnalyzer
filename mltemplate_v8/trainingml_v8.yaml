apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: naive-bayes-training-v8
  annotations:
    scenarios.ai.sap.com/description: "naive-bayes training Pipeline-v8"
    scenarios.ai.sap.com/name: "naive-bayes-v8"
    executables.ai.sap.com/description: "naive-bayes model-v8"
    executables.ai.sap.com/name: "naive-bayes-training-v8"
  labels:
    scenarios.ai.sap.com/id: "naive-bayes-v8"
    ai.sap.com/version: "1.0.0"
spec:
  entrypoint: training-pipeline
  templates:
    - name: training-pipeline
      steps:
        - - name: train
            template: train-step

    - name: train-step
      metadata:
        labels:
          ai.sap.com/resourcePlan: starter
      container:
        image: docker.io/rahulcruze786/ml_training_model:v1.13
        command: ["python"]
        args:
          - "metrics.py"
        env:
          - name: MODEL_DIR
            value: "/tmp/models"
      outputs:
        artifacts:
          - name: model-output
            globalName: ALL_MARKET_NB_MODEL_HK_SG
            path: /tmp/models          # ← only output models here
            archive:
              none: {}
