apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: naive-bayes-prediction-v4
  annotations:
    scenarios.ai.sap.com/description: "naive-bayes serving Pipeline-v4 multi-market"
    scenarios.ai.sap.com/name: "naive-bayes-v4"
    executables.ai.sap.com/description: "naive-bayes prediction-v4"
    executables.ai.sap.com/name: "naive-bayes-prediction-v4"
  labels:
    scenarios.ai.sap.com/id: "naive-bayes-v4"
    ai.sap.com/version: "1.0.0"
spec:
  inputs:
    artifacts:
      - name: multinomialNB-HongKong
      - name: multinomialNB-Singapore
      - name: multinomialNB-Malaysia
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: "{}"
      labels: "{\"ai.sap.com/resourcePlan\": \"starter\"}"
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 2
        containers:
          - name: kserve-container
            image: docker.io/rahulcruze786/ml_prediction:v1.9
            ports:
              - containerPort: 8080
                protocol: TCP
            command: ["python", "app.py"]
            env:
              - name: STORAGE_URI_HONGKONG
                value: "{{inputs.artifacts.multinomialNB-HongKong}}"
              - name: STORAGE_URI_SINGAPORE
                value: "{{inputs.artifacts.multinomialNB-Singapore}}"
              - name: STORAGE_URI_MALAYSIA
                value: "{{inputs.artifacts.multinomialNB-Malaysia}}"
              - name: MODEL_PATH
                value: "/mnt/models"
            resources:
              requests:
                cpu: "0.5"
                memory: "512Mi"
              limits:
                cpu: "1"
                memory: "1Gi"
